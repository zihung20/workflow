name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  library:
    name: Library — typecheck / lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowyd

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: flowyd/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build


  deploy-docs:
    name: Docs + Playground — build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: library
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            flowyd/pnpm-lock.yaml
            web-runner/pnpm-lock.yaml

      - name: Install flowyd dependencies
        working-directory: flowyd
        run: pnpm install --frozen-lockfile

      - name: Build library
        working-directory: flowyd
        run: pnpm build

      - name: Build docs
        working-directory: flowyd
        run: pnpm docs:build

      - name: Install web-runner dependencies
        working-directory: web-runner
        run: pnpm install --frozen-lockfile

      - name: Build playground
        working-directory: web-runner
        run: pnpm build:pages

      - name: Copy playground into docs
        run: cp -r web-runner/dist flowyd/docs/.vitepress/dist/playground

      - uses: actions/upload-pages-artifact@v3
        with:
          path: flowyd/docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
